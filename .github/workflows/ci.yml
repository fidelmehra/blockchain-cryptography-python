# =============================================================================
# ci.yml — GitHub Actions CI/CD pipeline
# Author: Fidel Mehra
#
# Jobs:
#   lint     — ruff + black + isort
#   security — bandit SAST scan
#   test     — pytest with coverage (Python 3.10, 3.11, 3.12 matrix)
#   docker   — build Docker image (push on main)
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_DEFAULT: "3.11"

jobs:

  # ---------------------------------------------------------------------------
  # Linting
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff + black + isort)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff black isort

      - name: ruff check
        run: ruff check src/ tests/

      - name: black check
        run: black --check src/ tests/

      - name: isort check
        run: isort --check-only src/ tests/


  # ---------------------------------------------------------------------------
  # Security
  # ---------------------------------------------------------------------------
  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: bandit -r src/ -ll -x src/api/app.py


  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == env.PYTHON_DEFAULT
        with:
          name: coverage-report
          path: coverage.xml


  # ---------------------------------------------------------------------------
  # Docker build
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: fidelmehra/blockchain-cryptography-python:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push to Docker Hub (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        with:
          context: .
          push: true
          tags: |
            fidelmehra/blockchain-cryptography-python:latest
            fidelmehra/blockchain-cryptography-python:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
